server:
  address: 127.0.0.1

spring:
  sql:
    init:
      mode: never

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:campus_secondhand}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

campus:
  jwt:
    secret: ${JWT_SECRET:campus-secondhand-jwt-secret-key-change-in-production}
  upload:
    path: ${UPLOAD_PATH:./uploads}
    url-prefix: /uploads/
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
