# Linux: 复制到 /etc/nginx/sites-available/ 后 enable
#   sudo cp deploy/nginx/campus-secondhand.conf /etc/nginx/sites-available/campus-secondhand
#   sudo ln -sf /etc/nginx/sites-available/campus-secondhand /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 部署前请修改 root 路径
# 其他电脑通过 http://服务器IP 访问（需放行防火墙 80 端口）

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/campus-secondhand/frontend;
    index index.html;

    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
